<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaviBot - Maintenance</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
font-family:Arial,Helvetica,sans-serif;
color:white;
overflow:hidden;
}

.background{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 30%,#00eaff33,transparent),
radial-gradient(circle at 80% 70%,#3b82f633,transparent);
animation:move 10s infinite alternate;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(-50px,-30px)}
}

.box{
position:relative;
text-align:center;
padding:60px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(0,0,0,0.6);
max-width:600px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

h1 span{
color:#00eaff;
}

.loader{
margin:30px auto;
width:60px;
height:60px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #00eaff;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

p{
font-size:18px;
opacity:0.9;
line-height:1.6;
}

footer{
margin-top:25px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="box">

<h1>Savi<span>Bot</span></h1>

<div class="loader"></div>

<p>
Le site officiel de SaviBot est actuellement en cours de maintenance.
</p>

<p>
Nos systèmes sont en amélioration pour vous offrir une meilleure expérience.
Merci de revenir un peu plus tard.
</p>

<footer>
© 2026 SaviBot
</footer>

</div>

</body>
</html>
