<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaviBot - Maintenance</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
  color:white;
  overflow:hidden;
}

.box{
  text-align:center;
  padding:50px 40px;
  border-radius:25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 50px rgba(0,0,0,0.5);
  max-width:600px;
}

h1{
  font-size:50px;
  margin-bottom:15px;
}

h1 span{
  color:#00eaff;
  text-shadow:0 0 10px #00eaff, 0 0 20px #00eaff;
}

.loader{
  margin:30px auto;
  width:70px;
  height:70px;
  border-radius:50%;
  border:8px solid rgba(255,255,255,0.2);
  border-top:8px solid #00eaff;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

p{
  font-size:18px;
  opacity:0.9;
  margin-top:20px;
  line-height:1.6;
}

footer{
  margin-top:30px;
  font-size:14px;
  opacity:0.7;
}
.background{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%,#00eaff33,transparent),
              radial-gradient(circle at 70% 70%,#3b82f633,transparent);
  animation:move 12s infinite alternate;
  z-index:-1;
}

@keyframes move{
  0%{transform:translate(0,0);}
  100%{transform:translate(-60px,-40px);}
}
</style>
</head>
<body>

<div class="background"></div>

<div class="box">
<h1>Savi<span>Bot</span></h1>
<div class="loader"></div>
<p>
Le site officiel de SaviBot est actuellement en cours de maintenance.
</p>
<p>
Nous renforçons la sécurité et améliorons les fonctionnalités pour une meilleure expérience.
Merci de revenir plus tard.
</p>
<footer>© 2026 SaviBot</footer>
</div>

</body>
</html>
